<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sara & Shan — Wedding Celebration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ░░ STICKY NAV ░░ -->
    <nav id="site-nav">
        <span class="nav-monogram">S <span>&</span> S</span>
        <ul id="nav-links"></ul>
    </nav>

    <!-- ░░ HERO ░░ -->
    <header id="hero">
        <div class="hero-bg-grain"></div>
        <div class="hero-content">
            <p class="hero-eyebrow">The Wedding Of</p>
            <h1 class="hero-title">
                <em>Sara Shehnaz Abbasi</em>
                <span class="hero-amp">&amp;</span>
                <em>Muhammed Shan Ahmed</em>
            </h1>
            <div class="hero-divider"></div>
            <p class="hero-date">January 2024</p>
            <a href="#events" class="hero-scroll-cue" aria-label="Scroll down">
                <span>↓</span>
            </a>
        </div>
    </header>

    <!-- ░░ EVENTS ░░ -->
    <main id="events"></main>

    <!-- ░░ FOOTER ░░ -->
    <footer>
        <div class="footer-inner">
            <p class="footer-monogram"><em>S &amp; S</em></p>
            <p class="footer-gift">A gift of memories, with love</p>
            <p class="footer-copy">© 2024</p>
        </div>
    </footer>

    <!-- ░░ LIGHTBOX ░░ -->
    <div id="lightbox" aria-hidden="true">
        <button id="lb-close" aria-label="Close">✕</button>
        <button id="lb-prev" aria-label="Previous">‹</button>
        <button id="lb-next" aria-label="Next">›</button>
        <div id="lb-media-wrap">
            <img id="lb-img" src="" alt="Wedding photo" />
        </div>
        <p id="lb-caption"></p>
        <div id="lb-counter"></div>
    </div>
    <div id="lightbox-backdrop"></div>

    <!-- ░░ VIDEO MODAL ░░ -->
    <div id="video-modal" aria-hidden="true">
        <div id="video-modal-inner">
            <button id="vm-close" aria-label="Close video">✕</button>
            <div id="vm-wrap">
                <iframe id="vm-iframe" src="" allowfullscreen allow="autoplay; fullscreen"></iframe>
                <video id="vm-video" controls playsinline></video>
            </div>
            <p id="vm-label"></p>
        </div>
    </div>
    <div id="video-backdrop"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
